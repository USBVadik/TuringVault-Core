name: Agent Cycle

# Continuous-cron multi-agent runner. Fires every hour and commits
# state files back to main so the front-end can pick them up via
# Vercel auto-deploy.
#
# Spec: .kiro/specs/continuous-cron-and-health
# Runbook: .kiro/runbooks/cron-operations.md

on:
  schedule:
    # Two slots per hour at off-peak minutes. GH Actions regularly skips
    # one slot under load; having two gives near-100% hourly coverage.
    # If both fire within an hour, the concurrency group queues the second
    # run; the explicit sync step below refreshes it before execution.
    - cron: "17 * * * *"
    - cron: "47 * * * *"
  workflow_dispatch: # Manual trigger for debugging

# Prevent overlapping runs (in case a cycle is slow). cancel-in-progress=false
# lets the current LLM cycle finish; queued triggers sync main before running.
concurrency:
  group: agent-cycle
  cancel-in-progress: false

permissions:
  contents: write # Required for git push back to main

jobs:
  cycle:
    name: Run multi-agent cycle
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Hard ceiling; node call has its own 10m timeout

    env:
      AGENT_RUN_MODE: cron-github-actions
      RWA_EXECUTE_ENABLED: "true"
      # Submission-window heartbeat liveness (Path C). Default OFF.
      # See .kiro/audits/17-heartbeat-mode.md for safety gates.
      HEARTBEAT_MODE_ENABLED: ${{ secrets.HEARTBEAT_MODE_ENABLED }}
      # Hackathon: reduce idle-parking wait from 24h to 4h
      RWA_IDLE_PARKING_MIN_FLAT_MS: "14400000"
      MANTLE_RPC_URL: ${{ secrets.MANTLE_RPC_URL }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      NANSEN_API_KEY: ${{ secrets.NANSEN_API_KEY }}
      ELFA_API_KEY: ${{ secrets.ELFA_API_KEY }}
      PINATA_JWT: ${{ secrets.PINATA_JWT }}
      PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
      PINATA_SECRET: ${{ secrets.PINATA_SECRET }}
      GEMINI_PROJECT_ID: ${{ secrets.GEMINI_PROJECT_ID }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync latest main before cycle
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Write Gemini service-account key
        # Pasted as a single GitHub secret containing the full JSON file.
        # geminiArbiter.js reads $GOOGLE_APPLICATION_CREDENTIALS path.
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "::warning::GOOGLE_APPLICATION_CREDENTIALS_JSON not set; arbiter will fall back to conservative-block."
          else
            printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > ./gemini-service-account.json
            chmod 600 ./gemini-service-account.json
          fi

      - name: Run cycle
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./gemini-service-account.json
        run: |
          set +e
          CYCLE_STARTED_AT=$(date -u +%FT%TZ)
          timeout 600 node scripts/run-cycle.js
          code=$?
          set -e

          if [ "$code" -eq 0 ]; then
            exit 0
          fi

          # Exit 2 means run-cycle detected corrupt JSON state. Stop before
          # the commit step so we never publish broken state files.
          if [ "$code" -eq 2 ]; then
            exit "$code"
          fi

          CYCLE_EXIT_CODE="$code" CYCLE_STARTED_AT="$CYCLE_STARTED_AT" \
            node scripts/write-cycle-failure-summary.js "run-cycle exited ${code}"

      # Honesty-rule invariant: outcomes.json MUST NOT advertise
      # EXECUTED_SWAP without a real on-chain TX. This is the exact
      # class of bug we caught manually in cycles 113-122 (audit
      # .kiro/audits/2026-05-28-trading-unblock.md). If the cron
      # cycle just produced a row that violates it, FAIL the build
      # so the row never lands on main and never reaches the
      # dashboard. Re-using the jest runner so we share regex +
      # tier-resolution logic with local development.
      - name: Verify outcomes integrity invariants
        run: npx jest tests/unit/outcomesIntegrity.unit.test.js --silent

      - name: Commit state changes
        run: |
          # Remove the ephemeral key file BEFORE staging anything so it
          # can never end up in a commit even if the path were tracked.
          rm -f ./gemini-service-account.json

          git config user.name "TuringVault Cron"
          git config user.email "cron@turingvault.ai"

          # Stage only the state files we care about, and only those
          # that actually exist on disk. Single-line `git add a b c …`
          # would fail (exit 1) on any missing file under bash -e and
          # silently skip the rest because of the `|| true` swallow,
          # which manifested as "No state changes to commit" even when
          # the cycle had written real changes.
          for f in \
            src/data/outcomes.json \
            src/data/parse_metrics.json \
            src/data/threshold_state.json \
            src/data/position_state.json \
            src/data/grid_bot_state.json \
            src/data/grid_param_history.json \
            data/loop_progress.json \
            data/last-cycle-summary.json \
            data/cycle-history.json \
            data/cycle-failures.json \
            data/discipline-history.json \
            data/challenge-budget.json
          do
            [ -f "$f" ] && git add "$f"
          done

          # Reproducible AI replay manifests — one per cycle. These are
          # committed every cycle so the public git history carries the
          # full prompt+response trail for every decision (see
          # .kiro/audits/16-reproducible-ai-capture.md).
          if compgen -G ".kiro/audits/raw/replay-manifests/cycle-*.json" > /dev/null; then
            git add .kiro/audits/raw/replay-manifests/cycle-*.json
          fi

          git status --short

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          if [ -f data/last-cycle-summary.json ]; then
            DECISION_ID=$(jq -r '.decisionId // "?"' data/last-cycle-summary.json)
            TIER=$(jq -r '.decisionTier // "UNKNOWN"' data/last-cycle-summary.json)
            TIMESTAMP=$(jq -r '.cycleEndedAt // "?"' data/last-cycle-summary.json)
          else
            DECISION_ID="?"
            TIER="UNKNOWN"
            TIMESTAMP=$(date -u +%FT%TZ)
          fi

          git commit -m "chore(cron): cycle ${DECISION_ID} ${TIMESTAMP} ${TIER}"

          # If origin/main advanced after cycle generation, do not rebase
          # generated JSON state. The next schedule/watchdog trigger will
          # regenerate from the fresher main revision.
          if ! git push origin main; then
            echo "::warning::origin/main advanced after cycle generation. Skipping stale cycle commit instead of rebasing generated JSON state."
            echo "Skipping stale cycle commit; the next scheduled or watchdog trigger will regenerate from the latest main."
            exit 0
          fi
