name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run contract tests
        run: npx hardhat test
        env:
          REPORT_GAS: "false"

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install forge-std
        run: forge install foundry-rs/forge-std
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Foundry property + fuzz tests
        run: forge test
        env:
          # FOUNDRY_FUZZ_RUNS overrides the toml; keep CI runs reasonable.
          FOUNDRY_FUZZ_RUNS: "256"

  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint backend
        run: npx eslint src/ --max-warnings 50

      - name: Run unit tests
        run: npx jest tests/unit --coverage --coverageReporters=text-summary
        env:
          DRY_RUN: "true"
          NODE_ENV: test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: "ci-placeholder"
          NEXT_PUBLIC_MANTLE_RPC: "https://rpc.mantle.xyz"
          NEXT_PUBLIC_ROUTER_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_VALIDATION_REGISTRY_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_DECISION_LOG_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_IDENTITY_ADDRESS: "0x0000000000000000000000000000000000000000"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Audit (root)
        run: npm audit --omit=dev --audit-level=high

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Audit (frontend)
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

      - name: Check for secrets
        run: |
          # Fail if any private keys or API keys are hardcoded
          # Exclude known-safe contexts: contract addresses, TX hashes, topic hashes, event signatures
          ! grep -rn "0x[0-9a-fA-F]\{64\}" src/ --include="*.js" | grep -vi "address\|hash\|topic\|txHash\|onChainTx\|transactionHash\|eventSignature\|0x0af233"
          ! grep -rn "sk-[a-zA-Z0-9]\{20,\}" src/ --include="*.js"
          echo "✅ No hardcoded secrets found"

      - name: State file change guard (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          PROTECTED="src/data/outcomes.json src/data/position_state.json src/data/outcome_history.json agent-card-v2.json assets/agent-card.json"
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD)
          FLAGGED=""
          for f in $PROTECTED; do
            if echo "$CHANGED" | grep -q "^$f$"; then
              FLAGGED="$FLAGGED $f"
            fi
          done
          if [ -n "$FLAGGED" ]; then
            echo "❌ PR modifies protected state files:$FLAGGED"
            echo "These files are normally written by the automated cron cycle."
            echo "Ensure this change is intentional and reviewed by CODEOWNERS."
            exit 1
          fi
