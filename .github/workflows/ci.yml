name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run contract tests
        run: npx hardhat test

  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint backend
        run: npx eslint src/ --max-warnings 50

      - name: Run unit tests
        run: npx jest --coverage --coverageReporters=text-summary
        env:
          DRY_RUN: 'true'
          NODE_ENV: test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 'ci-placeholder'
          NEXT_PUBLIC_MANTLE_RPC: 'https://rpc.mantle.xyz'

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Audit (root)
        run: npm audit --omit=dev || true

      - name: Check for secrets
        run: |
          # Fail if any private keys or API keys are hardcoded
          ! grep -rn "0x[0-9a-fA-F]\{64\}" src/ --include="*.js" | grep -vi "address\|hash\|topic"
          ! grep -rn "sk-[a-zA-Z0-9]\{20,\}" src/ --include="*.js"
          echo "✅ No hardcoded secrets found"
