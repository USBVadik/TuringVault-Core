  <!-- Accent line -->
  <rect x="100" y="280" width="200" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Badge -->
  <rect x="100" y="440" width="140" height="36" rx="18" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <text x="130" y="464" font-family="monospace" font-size="14" fill="#06b6d4">LIVE ON MAINNET</text>
