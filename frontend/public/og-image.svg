  <!-- Title -->
  <text x="100" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white">TuringVault</text>
  <!-- Subtitle -->
  <text x="100" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Proof-of-Reasoning Trust Firewall</text>
