<!DOCTYPE html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1920px;
        height: 1080px;
        background: radial-gradient(
          ellipse at 30% 50%,
          #1a0533 0%,
          #0a0a0f 70%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
        color: white;
        overflow: hidden;
        position: relative;
      }
      .grid {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: linear-gradient(
            rgba(139, 92, 246, 0.05) 1px,
            transparent 1px
          ),
          linear-gradient(90deg, rgba(139, 92, 246, 0.05) 1px, transparent 1px);
        background-size: 60px 60px;
      }
      .glow-orb {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(139, 92, 246, 0.3) 0%,
          transparent 70%
        );
        top: 20%;
        left: 60%;
        animation: pulse 4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.6;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
      }
      .content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .logo {
        font-size: 72px;
        font-weight: 900;
        background: linear-gradient(135deg, #a78bfa, #7c3aed, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
        letter-spacing: -2px;
      }
      .subtitle {
        font-size: 32px;
        color: #a78bfa;
        margin-bottom: 40px;
        font-weight: 300;
      }
      .tagline {
        font-size: 24px;
        color: rgba(255, 255, 255, 0.7);
        max-width: 800px;
        line-height: 1.6;
      }
      .badge {
        margin-top: 50px;
        display: flex;
        gap: 30px;
        align-items: center;
      }
      .badge-item {
        padding: 12px 24px;
        border: 1px solid rgba(139, 92, 246, 0.4);
        border-radius: 8px;
        font-size: 16px;
        color: #a78bfa;
      }
      .mantle-badge {
        background: rgba(139, 92, 246, 0.1);
        border-color: #7c3aed;
      }
      .bottom-text {
        position: absolute;
        bottom: 40px;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="glow-orb"></div>
    <div class="content">
      <div class="logo">TuringVault</div>
      <div class="subtitle">Proof-of-Reasoning Trust Firewall</div>
      <div class="tagline">
        The AI agent that proves why it didn't trade.<br />
        Multi-model consensus • On-chain proofs • Autonomous safety.
      </div>
      <div class="badge">
        <div class="badge-item mantle-badge">⬡ Mantle Network</div>
        <div class="badge-item">🧠 AI Agents</div>
        <div class="badge-item">🔗 On-Chain Verified</div>
      </div>
    </div>
    <div class="bottom-text">Mantle Turing Test Hackathon 2025</div>
  </body>
</html>
