[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test/foundry"
cache_path = "cache_forge"
remappings = [
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
    "forge-std/=lib/forge-std/src/"
]

# Match Hardhat's compiler config so deployed bytecode patterns line up
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false

# Fuzz config — high run count to surface edge cases, especially for
# ERC-8004 registries where state monotonicity matters.
[fuzz]
runs = 1024
max_test_rejects = 65536
seed = "0x1"

[invariant]
runs = 256
depth = 50
fail_on_revert = false

[rpc_endpoints]
mantle = "https://rpc.mantle.xyz"
